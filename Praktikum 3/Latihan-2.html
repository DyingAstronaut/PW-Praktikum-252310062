<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2 - Form Pemesanan Tiket</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
            color: #333;
        }
        .container {
            background-color: #fff;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #d35400;
            border-bottom: 2px solid #d35400;
            padding-bottom: 10px;
        }
        h3 {
            color: #444;
            margin-top: 25px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }
        table {
            width: 100%;
        }
        td {
            padding: 8px 0;
            vertical-align: middle;
        }
        .label-col {
            width: 35%;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select {
            width: 90%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-group {
            margin-top: 20px;
            text-align: center;
        }
        input[type="button"], input[type="reset"] {
            padding: 10px 20px;
            margin: 0 5px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            border: none;
        }
        input[type="button"] {
            background-color: #2980b9;
            color: white;
        }
        input[type="reset"] {
            background-color: #c0392b;
            color: white;
        }
        .output-row input {
            background-color: #e8f8f5;
            font-weight: bold;
            color: #16a085;
        }
    </style>

    <!-- JavaScript -->
    <script language="JavaScript">
        function hitungTiket() {
            var form = document.formTravel;
            
            // Input form
            var tujuan = form.tujuan.value;
            var kelas = form.kelas.value;
            var jumlah = parseInt(form.jumlah.value);
            var isMember = form.member.checked;
            
            if (isNaN(jumlah) || jumlah <= 0) {
                alert("Masukkan jumlah tiket yang valid!");
                return;
            }

            var harga = 0;

            if (tujuan == "Jakarta") {
                if (kelas == "Eksekutif") harga = 70000;
                else if (kelas == "Bisnis") harga = 40000;
                else if (kelas == "Ekonomi") harga = 10000;
            } 
            else if (tujuan == "Solo") {
                if (kelas == "Eksekutif") harga = 80000;
                else if (kelas == "Bisnis") harga = 50000;
                else if (kelas == "Ekonomi") harga = 20000;
            } 
            else if (tujuan == "Surabaya") {
                if (kelas == "Eksekutif") harga = 90000;
                else if (kelas == "Bisnis") harga = 60000;
                else if (kelas == "Ekonomi") harga = 30000;
            }
            var subtotal = harga * jumlah;
            var diskon = 0;
            
            // Diskon 10%
            if (isMember == true) {
                diskon = 0.10 * subtotal;
            }
            
            var totalBayar = subtotal - diskon;

            // Assign ke Output
            form.outHarga.value = harga;
            form.outSubtotal.value = subtotal;
            form.outDiskon.value = diskon;
            form.outTotal.value = totalBayar;
        }
    </script>
</head>
<body>

<div class="container">
    <h2>Travel IBIK Abadi</h2>
    
    <form name="formTravel">
        <!-- Form Input -->
        <h3>Form Pemesanan Tiket</h3>
        <table>
            <tr>
                <td class="label-col">Nama Pemesan</td>
                <td>: <input type="text" name="nama"></td>
            </tr>
            <tr>
                <td class="label-col">Tujuan</td>
                <td>: 
                    <select name="tujuan">
                        <option value="Jakarta">Jakarta</option>
                        <option value="Solo">Solo</option>
                        <option value="Surabaya">Surabaya</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td class="label-col">Kelas</td>
                <td>: 
                    <select name="kelas">
                        <option value="Eksekutif">Eksekutif</option>
                        <option value="Bisnis">Bisnis</option>
                        <option value="Ekonomi">Ekonomi</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td class="label-col">Banyak Tiket</td>
                <td>: <input type="number" name="jumlah" min="1" placeholder="0"></td>
            </tr>
            <tr>
                <td class="label-col">Status Member</td>
                <td>: <input type="checkbox" name="member"> Ya, saya Member (Diskon 10%)</td>
            </tr>
        </table>

        <!-- Buttns -->
        <div class="btn-group">
            <input type="button" value="HITUNG TOTAL" onclick="hitungTiket()">
            <input type="reset" value="ULANG">
        </div>

        <!-- Output -->
        <h3>Hasil Perhitungan</h3>
        <table>
            <tr class="output-row">
                <td class="label-col">Harga Tiket</td>
                <td>: <input type="text" name="outHarga" readonly></td>
            </tr>
            <tr class="output-row">
                <td class="label-col">Subtotal</td>
                <td>: <input type="text" name="outSubtotal" readonly></td>
            </tr>
            <tr class="output-row">
                <td class="label-col">Diskon (10%)</td>
                <td>: <input type="text" name="outDiskon" readonly></td>
            </tr>
            <tr class="output-row">
                <td class="label-col">Total Bayar</td>
                <td>: <input type="text" name="outTotal" readonly></td>
            </tr>
        </table>
    </form>
</div>

</body>
</html>
